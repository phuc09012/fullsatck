services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: library-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1434:1433"
    volumes:
      - library-sqlserver-data:/var/opt/mssql

  catalogservice:
    build:
      context: .
      dockerfile: src/CatalogService/Dockerfile
    container_name: library-catalogservice
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogDb: Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: LibraryAuth
      Jwt__Audience: LibraryUsers
      Jwt__Key: ChangeThisKeyToSomethingAtLeast32CharsLong!
      InternalApi__Key: LibraryInternalSecretChangeMe!
      IntegrationEvents__Subscribers__book.availability.changed__0: http://circulationservice:8080/integration/events/book-availability-changed
    ports:
      - "5001:8080"

  circulationservice:
    build:
      context: .
      dockerfile: src/CirculationService/Dockerfile
    container_name: library-circulationservice
    depends_on:
      - sqlserver
      - catalogservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CirculationDb: Server=sqlserver,1433;Database=CirculationDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: LibraryAuth
      Jwt__Audience: LibraryUsers
      Jwt__Key: ChangeThisKeyToSomethingAtLeast32CharsLong!
      InternalApi__Key: LibraryInternalSecretChangeMe!
      CatalogService__BaseUrl: http://catalogservice:8080
      IdentityService__BaseUrl: http://identityreportservice:8080
      IntegrationEvents__Subscribers__book.borrowed__0: http://identityreportservice:8080/integration/events/book-borrowed
      IntegrationEvents__Subscribers__book.returned__0: http://identityreportservice:8080/integration/events/book-returned
      IntegrationEvents__Subscribers__fine.paid__0: http://identityreportservice:8080/integration/events/fine-paid
    ports:
      - "5002:8080"

  identityreportservice:
    build:
      context: .
      dockerfile: src/IdentityReportService/Dockerfile
    container_name: library-identityreportservice
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDb: Server=sqlserver,1433;Database=IdentityDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: LibraryAuth
      Jwt__Audience: LibraryUsers
      Jwt__Key: ChangeThisKeyToSomethingAtLeast32CharsLong!
      Jwt__ExpiryMinutes: 480
      InternalApi__Key: LibraryInternalSecretChangeMe!
    ports:
      - "5003:8080"

  apigateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: library-apigateway
    depends_on:
      - catalogservice
      - circulationservice
      - identityreportservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      UseDockerHosts: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: library-frontend
    depends_on:
      - apigateway
    ports:
      - "4173:80"

volumes:
  library-sqlserver-data:
