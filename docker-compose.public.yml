services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: library-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_password123}
    volumes:
      - library-sqlserver-data:/var/opt/mssql

  catalogservice:
    build:
      context: .
      dockerfile: src/CatalogService/Dockerfile
    container_name: library-catalogservice
    restart: unless-stopped
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogDb: Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: ${JWT_ISSUER:-LibraryAuth}
      Jwt__Audience: ${JWT_AUDIENCE:-LibraryUsers}
      Jwt__Key: ${JWT_KEY:-ChangeThisKeyToSomethingAtLeast32CharsLong!}
      InternalApi__Key: ${INTERNAL_API_KEY:-LibraryInternalSecretChangeMe!}
      IntegrationEvents__Subscribers__book.availability.changed__0: http://circulationservice:8080/integration/events/book-availability-changed

  circulationservice:
    build:
      context: .
      dockerfile: src/CirculationService/Dockerfile
    container_name: library-circulationservice
    restart: unless-stopped
    depends_on:
      - sqlserver
      - catalogservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CirculationDb: Server=sqlserver,1433;Database=CirculationDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: ${JWT_ISSUER:-LibraryAuth}
      Jwt__Audience: ${JWT_AUDIENCE:-LibraryUsers}
      Jwt__Key: ${JWT_KEY:-ChangeThisKeyToSomethingAtLeast32CharsLong!}
      InternalApi__Key: ${INTERNAL_API_KEY:-LibraryInternalSecretChangeMe!}
      CatalogService__BaseUrl: http://catalogservice:8080
      IdentityService__BaseUrl: http://identityreportservice:8080
      IntegrationEvents__Subscribers__book.borrowed__0: http://identityreportservice:8080/integration/events/book-borrowed
      IntegrationEvents__Subscribers__book.returned__0: http://identityreportservice:8080/integration/events/book-returned
      IntegrationEvents__Subscribers__fine.paid__0: http://identityreportservice:8080/integration/events/fine-paid

  identityreportservice:
    build:
      context: .
      dockerfile: src/IdentityReportService/Dockerfile
    container_name: library-identityreportservice
    restart: unless-stopped
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDb: Server=sqlserver,1433;Database=IdentityDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: ${JWT_ISSUER:-LibraryAuth}
      Jwt__Audience: ${JWT_AUDIENCE:-LibraryUsers}
      Jwt__Key: ${JWT_KEY:-ChangeThisKeyToSomethingAtLeast32CharsLong!}
      Jwt__ExpiryMinutes: 480
      InternalApi__Key: ${INTERNAL_API_KEY:-LibraryInternalSecretChangeMe!}

  apigateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: library-apigateway
    restart: unless-stopped
    depends_on:
      - catalogservice
      - circulationservice
      - identityreportservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      UseDockerHosts: "true"
      Jwt__Issuer: ${JWT_ISSUER:-LibraryAuth}
      Jwt__Audience: ${JWT_AUDIENCE:-LibraryUsers}
      Jwt__Key: ${JWT_KEY:-ChangeThisKeyToSomethingAtLeast32CharsLong!}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: library-frontend
    restart: unless-stopped
    depends_on:
      - apigateway
    ports:
      - "80:80"

volumes:
  library-sqlserver-data:
